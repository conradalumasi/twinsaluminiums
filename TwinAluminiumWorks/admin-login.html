<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin Login | Twin Aluminium Works</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        opacity: 0.3;
        pointer-events: none;
      }

      .login-container {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 20px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        max-width: 450px;
        width: 100%;
        overflow: hidden;
        animation: slideUp 0.6s ease;
        position: relative;
        z-index: 1;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-header {
        background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        padding: 2rem;
        text-align: center;
        color: white;
      }

      .login-header .logo-icon {
        width: 70px;
        height: 70px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        font-size: 2rem;
        font-weight: 700;
      }

      .login-header h2 {
        font-size: 1.6rem;
        margin-bottom: 0.3rem;
      }

      .login-header p {
        font-size: 0.85rem;
        opacity: 0.9;
      }

      .login-body {
        padding: 2rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #2c3e50;
        font-weight: 500;
        font-size: 0.85rem;
      }

      .input-group {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-group i {
        position: absolute;
        left: 1rem;
        color: #95a5a6;
        font-size: 1rem;
      }

      .input-group input {
        width: 100%;
        padding: 0.9rem 1rem 0.9rem 2.8rem;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.3s ease;
        background: #f8f9fa;
      }

      .input-group input:focus {
        outline: none;
        border-color: #3498db;
        background: white;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
      }

      .toggle-password {
        position: absolute;
        right: 1rem;
        left: auto;
        cursor: pointer;
        color: #95a5a6;
        transition: color 0.3s ease;
      }

      .toggle-password:hover {
        color: #3498db;
      }

      .login-btn {
        width: 100%;
        padding: 0.9rem;
        background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 0.8rem;
        border-radius: 10px;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border-left: 4px solid #e74c3c;
        animation: shake 0.5s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      .login-footer {
        text-align: center;
        padding: 1.5rem;
        background: #f8f9fa;
        border-top: 1px solid #e0e0e0;
      }

      .login-footer p {
        font-size: 0.75rem;
        color: #7f8c8d;
      }

      .login-footer a {
        color: #3498db;
        text-decoration: none;
      }

      .login-footer a:hover {
        text-decoration: underline;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .remember-me input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .remember-me label {
        margin: 0;
        font-size: 0.85rem;
        cursor: pointer;
      }

      @media (max-width: 480px) {
        .login-container {
          margin: 1rem;
        }
        .login-header {
          padding: 1.5rem;
        }
        .login-body {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="logo-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <h2>Admin Portal</h2>
        <p>Secure access for authorized personnel only</p>
      </div>

      <div class="login-body">
        <div id="errorMsg" class="error-message" style="display: none">
          <i class="fas fa-exclamation-triangle"></i>
          <span id="errorText">Invalid credentials</span>
        </div>

        <form id="adminLoginForm">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Username</label>
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="username"
                placeholder="Enter username"
                required
                autocomplete="off"
              />
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
              />
              <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>
          </div>

          <div class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <label for="rememberMe">Remember me for 7 days</label>
          </div>

          <button type="submit" class="login-btn">
            <i class="fas fa-sign-in-alt"></i> Login to Dashboard
          </button>
        </form>
      </div>

      <div class="login-footer">
        <p>Protected area. All activities are logged.</p>
        <p>
          <a href="index.html"
            ><i class="fas fa-arrow-left"></i> Return to Website</a
          >
        </p>
      </div>
    </div>

    <script>
      // Admin credentials - Change these to your desired username and password
      const ADMIN_USERNAME = "twinadmin";
      const ADMIN_PASSWORD = "Twin@2026Secure!";

      // Also check for stored session
      function checkExistingSession() {
        const sessionData = sessionStorage.getItem("adminAuthenticated");
        const rememberData = localStorage.getItem("adminRemember");

        if (sessionData === "true") {
          window.location.href = "admin.html";
          return true;
        }

        if (rememberData) {
          try {
            const data = JSON.parse(rememberData);
            if (data.expiry > Date.now() && data.username === ADMIN_USERNAME) {
              sessionStorage.setItem("adminAuthenticated", "true");
              sessionStorage.setItem("adminUsername", data.username);
              window.location.href = "admin.html";
              return true;
            } else {
              localStorage.removeItem("adminRemember");
            }
          } catch (e) {
            localStorage.removeItem("adminRemember");
          }
        }
        return false;
      }

      // Check session on page load
      if (checkExistingSession()) {
        // Redirect is happening
      }

      // Toggle password visibility
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      if (togglePassword && passwordInput) {
        togglePassword.addEventListener("click", function () {
          const type =
            passwordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordInput.setAttribute("type", type);
          this.classList.toggle("fa-eye-slash");
        });
      }

      // Handle login form submission
      document
        .getElementById("adminLoginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const rememberMe = document.getElementById("rememberMe").checked;
          const errorMsg = document.getElementById("errorMsg");
          const errorText = document.getElementById("errorText");

          // Clear previous error
          errorMsg.style.display = "none";

          // Validate credentials
          if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
            // Set session storage
            sessionStorage.setItem("adminAuthenticated", "true");
            sessionStorage.setItem("adminUsername", username);
            sessionStorage.setItem("adminLoginTime", new Date().toISOString());

            // Set remember me if checked
            if (rememberMe) {
              const rememberData = {
                username: username,
                expiry: Date.now() + 7 * 24 * 60 * 60 * 1000, // 7 days
              };
              localStorage.setItem(
                "adminRemember",
                JSON.stringify(rememberData),
              );
            } else {
              localStorage.removeItem("adminRemember");
            }

            // Show success and redirect
            showSuccessAndRedirect();
          } else {
            // Show error
            errorText.textContent =
              "Invalid username or password. Access denied.";
            errorMsg.style.display = "flex";

            // Clear password field
            document.getElementById("password").value = "";

            // Log failed attempt (optional)
            console.warn(
              "Failed admin login attempt at:",
              new Date().toISOString(),
            );
          }
        });

      function showSuccessAndRedirect() {
        const btn = document.querySelector(".login-btn");
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        btn.disabled = true;

        setTimeout(function () {
          window.location.href = "admin.html";
        }, 800);
      }

      // Prevent back button after logout
      window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
          checkExistingSession();
        }
      });
    </script>
  </body>
</html>
